---
layout: maplist
title: All Maps
permalink: /maps-list/maps/
---
<div class="maps-atmosphere">
  <div class="maps-col-wrapper">
    {% for map in site.maps %}
    <div class="maps-col" data-map-name="{{ map.mapName | escape }}" data-map-name-slug="{{ map.slug }}">
      <a href="{{ '/map/' | prepend: site.baseurl | append: map.slug }}/" class="map-card-link">
        <div class="map-card-image">
          <img
            src="{{ map.img }}"
            alt="{{ map.mapName | escape }}"
            onerror="this.onerror=null;this.src='{{ '/images/missing_map.png' | prepend: site.baseurl }}';"
          />
        </div>
        <div class="map-card-footer">
          <h3 class="map-card-name">{{ map.mapName | escape }}</h3>
          <span class="map-card-cta">View Map &rarr;</span>
        </div>
      </a>
    </div>
    {% endfor %}
  </div>
</div>
