name: Update Map Pages

on:
  schedule:
    # Runs at the top of every hour
    - cron: "0 * * * *"
  workflow_dispatch:  # Allow manual runs for testing

jobs:
  sync-maps:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Sync map pages from server listing
        run: python3 .build/update-maps/sync_maps.py --maps-dir _maps

      - name: Commit and push if maps changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _maps/
          if ! git diff --cached --quiet; then
            git commit -m "Bot: sync map pages from server listing"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          else
            echo "No map changes to commit."
          fi

