---
layout: default
---
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://triplea-game.org/" },
    { "@type": "ListItem", "position": 2, "name": "{{ page.title | escape }}", "item": "https://triplea-game.org{{ page.url }}" }
  ]
}
</script>
<link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/highlight.js/9.11.0/styles/github-gist.min.css">
<script src="//cdnjs.cloudflare.com/ajax/libs/highlight.js/9.11.0/highlight.min.js"></script>
<script>
	hljs.initHighlightingOnLoad();
</script>
<article>
  <header>
    <h1 class="post-title">{{ page.title }}</h1>
  </header>
  {{ content }}
</article>
